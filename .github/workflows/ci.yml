name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Formatting check
        run: cargo fmt --all -- --check

      - name: Backend cargo check
        run: cargo check -p openprompter-rs-tauri --all-targets

      - name: Backend tests
        run: cargo test -p openprompter-rs-tauri

      - name: Backend clippy
        run: >
          cargo clippy -p openprompter-rs-tauri
          --all-targets --all-features
          -- -D warnings

      - name: Frontend WASM build
        run: trunk build

      - name: Frontend WASM tests
        run: wasm-pack test --headless --chrome
