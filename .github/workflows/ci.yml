name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Bridge: forces Node 20 JS actions (Swatinem/rust-cache@v2 — no Node 24
  # release yet) onto the Node 24 runtime, clearing deprecation warnings.
  # Remove once rust-cache ships a Node 24 major.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Formatting check
        run: cargo fmt --all -- --check

      - name: Backend cargo check
        run: cargo check -p openprompter-rs-tauri --all-targets

      - name: Backend tests
        run: cargo test -p openprompter-rs-tauri

      - name: Backend clippy
        run: >
          cargo clippy -p openprompter-rs-tauri
          --all-targets --all-features
          -- -D warnings

      - name: Frontend WASM build
        run: trunk build

      - name: Frontend WASM tests
        run: wasm-pack test --headless --chrome

  e2e:
    # Real-app end-to-end smoke: launches the built binary and clicks real
    # buttons via tauri-driver, crossing the actual window.__TAURI__ IPC bridge.
    # This is the layer that catches the "buttons do nothing" class of bug
    # (e.g. withGlobalTauri off) that MockApi/unit tests cannot see.
    #
    # NON-BLOCKING for now: headless WebKitGTK does not reliably render the WASM
    # frontend on the CI runner (the app launches but the page stays blank), so
    # this is a best-effort signal while the harness is stabilized. The scroll
    # and IPC regressions are also guarded by `validate` (unit + full_flow +
    # component tests). Run it locally on Windows (WebView2) where it works.
    continue-on-error: true
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux Tauri + WebDriver system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            webkit2gtk-driver \
            xvfb

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend (embedded into the binary)
        run: trunk build

      - name: Build app binary (release, unbundled)
        run: cargo build --release -p openprompter-rs-tauri

      - name: Install E2E deps
        working-directory: e2e
        run: npm install

      - name: Run E2E smoke (headless via xvfb)
        working-directory: e2e
        run: xvfb-run -a npm test
