name: Release

on:
  push:
    tags:
      # Public-release tags only. Phase tags (e.g. v0.13.0-phase13) must NOT
      # match, so internal phase milestones never trigger a release build.
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Bridge: forces Node 20 JS actions (Swatinem/rust-cache@v2 — no Node 24
  # release yet) onto the Node 24 runtime, clearing deprecation warnings.
  # Remove once rust-cache ships a Node 24 major.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2025
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Show release mode
        shell: bash
        run: |
          echo "ref=${{ github.ref }}"
          echo "is_tag=${{ startsWith(github.ref, 'refs/tags/') }}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Formatting check
        run: cargo fmt --all -- --check

      - name: Backend cargo check
        run: cargo check -p openprompter-rs-tauri --all-targets

      - name: Backend tests
        run: cargo test -p openprompter-rs-tauri

      - name: Backend clippy
        shell: bash
        run: >
          cargo clippy -p openprompter-rs-tauri
          --all-targets --all-features
          -- -D warnings

      - name: Frontend WASM build
        run: trunk build

      - name: Build Windows installer
        run: cargo tauri build
        env:
          # Updater signing key. Empty when the secret is unset; only consumed
          # when bundle.createUpdaterArtifacts is enabled (see docs/release.md).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Package portable ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "portapp" -Force | Out-Null
          Copy-Item "target/release/openprompter-rs-tauri.exe" "portapp/OpenPrompter RS.exe"
          Copy-Item "docs/portable-readme.txt" "portapp/README-INSTALL.txt"
          Compress-Archive -Path "portapp/*" -DestinationPath "portapp/OpenPrompter.RS_portable_x64.zip"
          Copy-Item "portapp/OpenPrompter.RS_portable_x64.zip" "target/release/"

      - name: Generate SHA256 checksums (Windows)
        shell: pwsh
        run: |
          Get-FileHash "target/release/bundle/msi/*.msi" | ForEach-Object { "{0}  {1}" -f $_.Hash.ToLower(), ($_.Path | Split-Path -Leaf) } | Out-File -FilePath "target/release/SHA256SUMS-windows.txt" -Encoding ascii
          Get-FileHash "target/release/bundle/nsis/*.exe" | ForEach-Object { "{0}  {1}" -f $_.Hash.ToLower(), ($_.Path | Split-Path -Leaf) } | Out-File -FilePath "target/release/SHA256SUMS-windows.txt" -Encoding ascii -Append
          Get-FileHash "target/release/OpenPrompter.RS_portable_x64.zip" | ForEach-Object { "{0}  {1}" -f $_.Hash.ToLower(), ($_.Path | Split-Path -Leaf) } | Out-File -FilePath "target/release/SHA256SUMS-windows.txt" -Encoding ascii -Append
          Get-Content "target/release/SHA256SUMS-windows.txt"

      - name: Upload Windows artifacts to release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
            target/release/OpenPrompter.RS_portable_x64.zip
            target/release/SHA256SUMS-windows.txt
          draft: false
          prerelease: true
          generate_release_notes: true

      - name: Updater fragment (Windows)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: bash scripts/updater-fragment.sh windows-x86_64 "target/release/bundle/nsis/*-setup.exe"

      - name: Upload updater fragment (Windows)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: updater-frag-windows-x86_64
          path: updater-frag/windows-x86_64.json

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Show release mode
        run: |
          echo "ref=${{ github.ref }}"
          echo "is_tag=${{ startsWith(github.ref, 'refs/tags/') }}"

      - name: Install Linux Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Formatting check
        run: cargo fmt --all -- --check

      - name: Backend cargo check
        run: cargo check -p openprompter-rs-tauri --all-targets

      - name: Backend tests
        run: cargo test -p openprompter-rs-tauri

      - name: Backend clippy
        run: >
          cargo clippy -p openprompter-rs-tauri
          --all-targets --all-features
          -- -D warnings

      - name: Frontend WASM build
        run: trunk build

      - name: Build Linux bundle
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Generate SHA256 checksums (Linux)
        run: |
          sha256sum target/release/bundle/appimage/*.AppImage | sed 's|target/release/bundle/appimage/||' > target/release/SHA256SUMS-linux.txt
          sha256sum target/release/bundle/deb/*.deb | sed 's|target/release/bundle/deb/||' >> target/release/SHA256SUMS-linux.txt
          sha256sum target/release/bundle/rpm/*.rpm | sed 's|target/release/bundle/rpm/||' >> target/release/SHA256SUMS-linux.txt
          cat target/release/SHA256SUMS-linux.txt

      - name: Upload Linux artifacts to release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm
            target/release/SHA256SUMS-linux.txt
          draft: false
          prerelease: true
          generate_release_notes: false

      - name: Updater fragment (Linux)
        if: startsWith(github.ref, 'refs/tags/')
        run: bash scripts/updater-fragment.sh linux-x86_64 "target/release/bundle/appimage/*.AppImage"

      - name: Upload updater fragment (Linux)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: updater-frag-linux-x86_64
          path: updater-frag/linux-x86_64.json

  build-macos:
    # Native build per arch: macos-13 = Intel (x86_64), macos-14 = Apple Silicon
    # (aarch64). No cross-compile — each runner builds its own DMG.
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x64
            updater_arch: x86_64
          - runner: macos-14
            arch: aarch64
            updater_arch: aarch64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Show release mode
        run: |
          echo "ref=${{ github.ref }}"
          echo "arch=${{ matrix.arch }} runner=${{ matrix.runner }}"
          echo "is_tag=${{ startsWith(github.ref, 'refs/tags/') }}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        run: cargo install trunk --locked

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Formatting check
        run: cargo fmt --all -- --check

      - name: Backend cargo check
        run: cargo check -p openprompter-rs-tauri --all-targets

      - name: Backend tests
        run: cargo test -p openprompter-rs-tauri

      - name: Backend clippy
        run: >
          cargo clippy -p openprompter-rs-tauri
          --all-targets --all-features
          -- -D warnings

      - name: Frontend WASM build
        run: trunk build

      - name: Build macOS bundle
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Name macOS updater bundle per arch
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd target/release/bundle/macos
          for f in *.app.tar.gz; do
            base="${f%.app.tar.gz}"
            mv "$f" "${base}_${{ matrix.arch }}.app.tar.gz"
            mv "${f}.sig" "${base}_${{ matrix.arch }}.app.tar.gz.sig"
          done
          ls -la

      - name: Generate SHA256 checksums (macOS)
        run: |
          shasum -a 256 target/release/bundle/dmg/*.dmg | sed 's|target/release/bundle/dmg/||' > target/release/SHA256SUMS-macos-${{ matrix.arch }}.txt
          cat target/release/SHA256SUMS-macos-${{ matrix.arch }}.txt

      - name: Upload macOS artifacts to release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app.tar.gz
            target/release/SHA256SUMS-macos-${{ matrix.arch }}.txt
          draft: false
          prerelease: true
          generate_release_notes: false

      - name: Updater fragment (macOS)
        if: startsWith(github.ref, 'refs/tags/')
        run: bash scripts/updater-fragment.sh "darwin-${{ matrix.updater_arch }}" "target/release/bundle/macos/*_${{ matrix.arch }}.app.tar.gz"

      - name: Upload updater fragment (macOS)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: updater-frag-darwin-${{ matrix.updater_arch }}
          path: updater-frag/darwin-${{ matrix.updater_arch }}.json

  # Assemble the multi-platform Tauri updater manifest (latest.json) from the
  # per-platform fragments uploaded by the build jobs, then attach it to the
  # release. Runs only on real tags (the build jobs only emit fragments then).
  publish-updater-manifest:
    needs: [build-windows, build-linux, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Download updater fragments
        uses: actions/download-artifact@v4
        with:
          pattern: updater-frag-*
          path: updater-frags
          merge-multiple: true

      - name: Assemble latest.json
        run: bash scripts/assemble-latest-json.sh updater-frags

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v3
        with:
          files: latest.json
          draft: false
          prerelease: true
          generate_release_notes: false
